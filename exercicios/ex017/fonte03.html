        @font-face {
            font-family: 'sephora' ; /* nome que quero colocar para fonte */
            src: url('Sephora & Hayden.ttf') format('truetype'); /* diretorio da fonte */

            /* tipos de formatos
            opentype (otf)
            trutype (ttf)
            embebed-opentype
            truetype-aat (apple advanced typography)
