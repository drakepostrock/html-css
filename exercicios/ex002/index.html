    <h1>Paragrafos e quebras de linha.</h1>
    <hr>
    <p>Podes escrever um paragrafo de qualquer jeito , basta colocar tudo dentro do tag &lt;p&gt;
        <!--lt - less than ; gt - great than-->
    </p>
    <p>Para quebrar o texto num lugar especifico <br> como este usar a tag &lt;br&gt;</p>
    <p>Vamos adicionar alguns simbolos especiais:
        &reg;
        &copy;
        &trade;
        &euro;
        &pound;
        &yen;
        &cent;
        &dollar;
        &Delta;
        &uparrow;
   </p>
   <p>Vamos adicionar emojis:
       &#x1F596;
       &#x1F913;

   </p>
