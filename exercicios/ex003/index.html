<!DOCTYPE html> <!-- tag da ultima versao do html5-->
<html lang="en"> <!-- ajuda a identificar o idioma do site para o browser, caso precise traducao do utilizador-->
<head>
    <meta charset="UTF-8"> <!--permite criar caraterers especiais com acentuacao e outras linguas no site-->
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!--o tamanho do site é sempre igual ao tamanho da tele do utilizador em escala 1-->
    <meta http-equiv="X-UA-Compatible" content="ie=edge"> <!--tag para carregar a ultima versao do browser explorer-->
    <title>Teste com imagens</title> <!-- texto apresentado no seprador do browser-->
</head>
<body>
    <h1>Testando carga de imagem</h1> <!--heading - titulos de h1 a h6-->
    <p>em baixo vais ver uma imagem na mesma pasta.</p> 
    <img src="html-logo-250.png" alt="logo html5">
    <p>Podemos carregar imagem que estao em sub-pastas</p>
    <img src="imagem/css-logo-250.png" alt="logo css"> <!-- tag para colocar imagem no site-->
    <p>Tambem podemos carregar imagens externas</p> <!-- tag de paragrafo-->
    <img src="https://th.bing.com/th/id/R.adfa821b794f40daa7cd09a7e03c4dde?rik=dZgVteSZVGqtQQ&riu=http%3a%2f%2fpluspng.com%2fimg-png%2fjavascript-logo-vector-png-logo-of-javascript-195.png&ehk=QJTA14Ta11x67suSQQSX%2b9JOQTAwuzWfIJptV9Fc7H4%3d&risl=&pid=ImgRaw&r=0" alt="logo javascript"> <!--URL-->
</body>
</html>
