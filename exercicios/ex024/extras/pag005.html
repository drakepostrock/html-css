<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Javascript</title>
    <style>
        body {
            background-color: red;
        }
    </style>
</head>
<body>
    <a href="#" onclick="clicou()">Clica em mim</a>
    <div id="saida"></div>


    <script>
        function clicou() {
            s = window.document.getElementById("saida")
            s.innerHTML += '<p>enviado</p>'
        }
    </script>
</body>
</html>
