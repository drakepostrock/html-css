<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Links</title>
    <style>
    
    body {
        font-family: Arial, Helvetica, sans-serif;
        font-size: 3em;
    }
    
    a {
        color: red;
        text-decoration: none;
        font-weight: bold;
    }

    a:visited {
        color: blue;
    }

    a:hover {
        color: black;
        text-decoration: underline;
    }

    .especial:hover {
        color:white;
    }

    a:active {
        color: yellow;
    }

    .especial {
        background-color: darkblue;
    }

    .especial::before {
        content: '--->';
    }


    .especial::after {
        content: '<---';
    }
    
    </style>
</head>
<body>
    <ul>
        <li><a href="https://youtube.com" target="_blank">Repositorio Github</a></li>
        <li><a href="https://youtube.com" target="_blank" class="especial">Canal de Youtube</a></li>
        <li><a href="https://youtube.com" target="_blank">Site do Curso em video</a></li>
    </ul>
</body>
</html>
